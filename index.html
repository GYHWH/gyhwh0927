<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快来回答！</title>
    <style>
        body { background: #ffebee; text-align: center; font-family: sans-serif; padding-top: 100px; overflow: hidden; }
        .box { background: white; width: 80%; max-width: 400px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        button { padding: 10px 25px; font-size: 18px; margin: 10px; border: none; border-radius: 10px; cursor: pointer; }
        #yes { background: #ff4081; color: white; }
        #no { background: #eee; position: absolute; transition: 0.1s; left: 50%; margin-left: 20px; }
        #msg { color: #ff4081; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box" id="content">
    <h1>💖</h1>
    <h2>做我的小猪好不好？</h2>
    <button id="yes" onclick="win()">好哒</button>
    <button id="no" onmouseover="move()" onclick="move()">不好</button>
    <div id="msg"></div>
</div>

<script>
    function move() {
        const btn = document.getElementById('no');
        const x = Math.random() * (window.innerWidth - btn.offsetWidth);
        const y = Math.random() * (window.innerHeight - btn.offsetHeight);
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        document.getElementById('msg').innerText = "躲得掉吗？😏";
    }

    function win() {
        document.getElementById('content').innerHTML = "<h1>🎉 耶！</h1><p>合同已生效，这辈子赖掉没门！</p>";
    }
</script>

</body>
</html>
