<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试页面</title>
</head>
<body style="text-align:center; padding-top:100px;">

    <h2 id="title">你愿意吗？</h2>
    
    <button id="yes" onclick="win()" style="padding:20px;">愿意</button>
    
    <button id="no" onmouseover="move()" onclick="move()" style="padding:10px; position:absolute;">不愿意</button>

    <script>
        // 这里的代码控制点击后的反应
        function win() {
            alert("太好了！合同已生效！");
            document.getElementById('title').innerText = "❤️ 契约达成！";
        }

        function move() {
            var btn = document.getElementById('no');
            var x = Math.random() * (window.innerWidth - btn.offsetWidth);
            var y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            console.log("按钮跑到了：" + x + "," + y);
        }
    </script>
</body>
</html>
